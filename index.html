<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AC Cellar — Drink Library</title>
<style>
  :root {
    --bg:        #0d0f12;
    --card:      #16191e;
    --card-brd:  #262b33;
    --card-brd2: #3a414d;
    --ink:       #e8e6e1;
    --ink-2:     #9aa3ae;
    --muted:     #6b7280;
    --teal:      #4ecdc4;
    --yellow:    #f4c542;
    --orange:    #f08a4b;
    --chip-bg:   #1e232b;
    --chip-brd:  #2e3540;
    --track:     #262b33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; }

  main { max-width: 1480px; margin: 0 auto; padding: 24px 24px 80px; }

  /* header */
  header.top {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--card-brd);
    margin-bottom: 18px;
  }
  header.top h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 30px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.5px;
  }
  header.top .sub {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--ink-2);
    text-transform: uppercase;
    margin-top: 6px;
  }
  header.top .spacer { flex: 1; }
  .btn {
    background: var(--card);
    border: 1px solid var(--card-brd2);
    color: var(--ink);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--teal); }
  .count-badge {
    background: var(--card);
    border: 1px solid var(--card-brd2);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    color: var(--yellow);
    white-space: nowrap;
  }

  /* mode switch */
  .mode-switch {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    border: 1px solid var(--card-brd2);
    border-radius: 8px;
    overflow: hidden;
    width: fit-content;
  }
  .mode-btn {
    background: var(--card);
    border: none;
    color: var(--ink-2);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 14px;
    padding: 11px 26px;
    cursor: pointer;
  }
  .mode-btn + .mode-btn { border-left: 1px solid var(--card-brd2); }
  .mode-btn.active {
    background: var(--chip-bg);
    color: var(--yellow);
  }
  .mode-btn:hover:not(.active) { color: var(--ink); }

  /* filter tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .tab {
    background: var(--card);
    border: 1px solid var(--card-brd);
    color: var(--ink-2);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab:hover { color: var(--ink); border-color: var(--card-brd2); }
  .tab.active { color: var(--yellow); border-color: var(--yellow); }
  .tabs .search {
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--card-brd);
    color: var(--ink);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 12px;
    min-width: 220px;
  }
  .tabs .search::placeholder { color: var(--muted); }

  .subtabs {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .subtabs.show { display: flex; }
  .subtab {
    background: transparent;
    border: 1px solid var(--card-brd);
    color: var(--ink-2);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    border-radius: 999px;
    padding: 5px 14px;
    cursor: pointer;
  }
  .subtab:hover { color: var(--ink); }
  .subtab.active { color: var(--teal); border-color: var(--teal); }

  /* grid & cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
    margin-top: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-brd);
    border-radius: 8px;
    padding: 20px 22px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--card-brd2); }
  .card.expanded { border-color: var(--card-brd2); }

  .card-head { display: flex; gap: 10px; align-items: baseline; }
  .card-head .icon { font-size: 16px; flex-shrink: 0; }
  .card-head h3 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 19px;
    font-weight: 700;
    margin: 0;
    flex: 1;
  }
  .card-head .zh {
    font-size: 13px;
    color: var(--ink-2);
    flex-shrink: 0;
    max-width: 40%;
    text-align: right;
  }
  .card .base {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12.5px;
    color: var(--ink-2);
    margin: 8px 0 14px;
  }

  .meters { display: flex; gap: 18px; margin-bottom: 14px; }
  .meter { flex: 1; }
  .meter .m-label {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .meter .m-bar {
    height: 4px;
    background: var(--track);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .meter .m-fill { height: 100%; border-radius: 2px; }
  .meter.acid .m-fill  { background: var(--teal); }
  .meter.sweet .m-fill { background: var(--yellow); }
  .meter.abv .m-fill   { background: var(--orange); }
  .meter .m-val {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    color: var(--ink);
  }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 11.5px;
    color: var(--teal);
    background: var(--chip-bg);
    border: 1px solid var(--chip-brd);
    border-radius: 4px;
    padding: 3px 9px;
  }

  /* bar rating stars */
  .stars {
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--yellow);
    margin-bottom: 12px;
  }
  .stars .dim { color: var(--track); }
  .stars .r-label {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-right: 8px;
  }

  /* expanded detail */
  .detail { display: none; margin-top: 16px; }
  .card.expanded .detail { display: block; }
  .detail .d-row {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12.5px;
    color: var(--ink-2);
    margin: 6px 0;
  }
  .detail .d-row .d-key { color: var(--muted); margin-right: 8px; }
  .detail ul.ingredients {
    margin: 10px 0;
    padding-left: 18px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.7;
  }
  .detail .pairing {
    font-size: 13px;
    color: var(--teal);
    margin: 10px 0;
  }
  .detail .story {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.75;
    margin: 10px 0;
  }
  .detail .src {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* drinks tried list in bar card */
  .drink-list { margin: 12px 0 4px; }
  .drink-item {
    border-left: 2px solid var(--card-brd2);
    padding: 6px 0 6px 12px;
    margin: 8px 0;
  }
  .drink-item .d-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
  }
  .drink-item .d-name .d-stars { color: var(--yellow); font-size: 12px; margin-left: 8px; letter-spacing: 1px; }
  .drink-item .d-note {
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.6;
    margin-top: 3px;
  }

  .type-chip {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px;
    border-radius: 4px;
    padding: 2px 8px;
    margin-left: 8px;
    vertical-align: 2px;
    white-space: nowrap;
  }
  .type-classic        { color: var(--yellow); border: 1px solid var(--yellow); }
  .type-modern_classic { color: var(--teal);   border: 1px solid var(--teal); }
  .type-signature      { color: var(--orange); border: 1px solid var(--orange); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 14px;
    grid-column: 1 / -1;
    line-height: 2;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--teal);
    color: var(--ink);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 8px;
    padding: 10px 20px;
    display: none;
    z-index: 99;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<h1 class="sr-only">AC Cellar：品飲紀錄與旅行酒吧體驗的可搜尋資料庫</h1>
<main>
  <header class="top">
    <div>
      <h1 aria-hidden="true">AC Cellar</h1>
      <div class="sub" id="header-sub">Drink Library</div>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="export-btn" type="button">📋 匯出給 AC</button>
    <div class="count-badge" id="count-badge">…</div>
  </header>

  <div class="mode-switch" role="tablist">
    <button class="mode-btn active" id="mode-drinks" type="button">🍸 酒窖收藏</button>
    <button class="mode-btn" id="mode-bars" type="button">🌍 酒吧體驗</button>
  </div>

  <div class="tabs" id="tabs">
    <input class="search" id="search" type="search" placeholder="搜尋酒名、基酒、標籤...">
  </div>
  <div class="subtabs" id="subtabs"></div>

  <div class="grid" id="grid"></div>
</main>
<div class="toast" id="toast"></div>

<script>
const CATS = [
  { key: '',         label: '全部' },
  { key: 'cocktail', label: '🍸 調酒' },
  { key: 'gin',      label: '🍸 Gin' },
  { key: 'whisky',   label: '🥃 Whisky' },
  { key: 'rum',      label: '🍹 Rum' },
  { key: 'tequila',  label: '🌵 Tequila / Mezcal' },
  { key: 'brandy',   label: '🍇 Brandy / Cognac' },
  { key: 'vodka',    label: '🧊 Vodka' },
  { key: 'wine',     label: '🍷 葡萄酒' },
  { key: 'sake',     label: '🍶 清酒／燒酎' },
  { key: 'beer',     label: '🍺 啤酒' },
  { key: 'other',    label: '🍵 其他' }
];
const SUBTYPES = [
  { key: '',               label: '全部' },
  { key: 'classic',        label: '經典 Classic' },
  { key: 'modern_classic', label: '現代經典 Modern Classic' },
  { key: 'signature',      label: '特調 Signature' }
];
const TYPE_LABEL = {
  classic: 'Classic', modern_classic: 'Modern Classic', signature: 'Signature'
};
const CAT_ICON = {
  cocktail: '🍸', gin: '🍸', whisky: '🥃', rum: '🍹', tequila: '🌵',
  brandy: '🍇', vodka: '🧊', wine: '🍷', sake: '🍶', beer: '🍺', other: '🍵'
};

let MODE = 'drinks';          // 'drinks' | 'bars'
let DATA = [];
let BARS = [];
let curCat = '';
let curSub = '';
let curCountry = '';
let curSearch = '';

Promise.all([
  fetch('data.json?v=' + Date.now(), { cache: 'no-store' }).then(r => r.json()),
  fetch('bars.json?v=' + Date.now(), { cache: 'no-store' }).then(r => r.ok ? r.json() : []).catch(() => [])
]).then(([drinks, bars]) => {
  DATA = drinks;
  BARS = bars;
  buildFilterBar();
  render();
}).catch(err => {
  document.getElementById('grid').innerHTML =
    '<div class="empty">讀取資料失敗，請確認以本機伺服器開啟此頁面。</div>';
  console.error(err);
});

/* ── mode switching ── */
document.getElementById('mode-drinks').addEventListener('click', () => setMode('drinks'));
document.getElementById('mode-bars').addEventListener('click', () => setMode('bars'));

function setMode(m) {
  if (MODE === m) return;
  MODE = m;
  curSearch = '';
  document.getElementById('mode-drinks').classList.toggle('active', m === 'drinks');
  document.getElementById('mode-bars').classList.toggle('active', m === 'bars');
  document.getElementById('header-sub').textContent = m === 'drinks' ? 'Drink Library' : 'Bar Journal';
  buildFilterBar();
  render();
}

/* ── filter bar (rebuilt per mode) ── */
function buildFilterBar() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';

  const search = document.createElement('input');
  search.className = 'search';
  search.id = 'search';
  search.type = 'search';
  search.placeholder = MODE === 'drinks' ? '搜尋酒名、基酒、標籤...' : '搜尋店名、城市、喝過的酒...';
  search.addEventListener('input', () => { curSearch = search.value.trim().toLowerCase(); render(); });
  tabs.appendChild(search);

  if (MODE === 'drinks') {
    CATS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'tab' + (c.key === curCat ? ' active' : '');
      b.type = 'button';
      b.textContent = c.label;
      b.dataset.key = c.key;
      b.addEventListener('click', () => {
        curCat = c.key;
        curSub = '';
        tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === curCat));
        buildSubtabs();
        render();
      });
      tabs.insertBefore(b, search);
    });
    buildSubtabs();
  } else {
    const countries = [...new Map(BARS.map(b => [b.country, b.flag || '📍'])).entries()];
    const all = [['', '全部'], ...countries.map(([c, f]) => [c, `${f} ${c}`])];
    all.forEach(([key, label]) => {
      const b = document.createElement('button');
      b.className = 'tab' + (key === curCountry ? ' active' : '');
      b.type = 'button';
      b.textContent = label;
      b.dataset.key = key;
      b.addEventListener('click', () => {
        curCountry = key;
        tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === curCountry));
        render();
      });
      tabs.insertBefore(b, search);
    });
    document.getElementById('subtabs').classList.remove('show');
  }
}

function buildSubtabs() {
  const wrap = document.getElementById('subtabs');
  wrap.innerHTML = '';
  if (MODE !== 'drinks' || curCat !== 'cocktail') { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  SUBTYPES.forEach(s => {
    const b = document.createElement('button');
    b.className = 'subtab' + (s.key === curSub ? ' active' : '');
    b.type = 'button';
    b.textContent = s.label;
    b.addEventListener('click', () => {
      curSub = s.key;
      wrap.querySelectorAll('.subtab').forEach((t, i) => t.classList.toggle('active', SUBTYPES[i].key === curSub));
      render();
    });
    wrap.appendChild(b);
  });
}

/* ── filtering ── */
function drinkMatches(item) {
  if (curCat && item.category !== curCat) return false;
  if (curCat === 'cocktail' && curSub && item.type !== curSub) return false;
  if (curSearch) {
    const hay = [
      item.name, item.nameZh, item.base, item.story, item.source, item.pairing,
      ...(item.tags || []),
      ...(item.ingredients || []).map(i => i.name)
    ].join(' ').toLowerCase();
    if (!hay.includes(curSearch)) return false;
  }
  return true;
}

function barMatches(bar) {
  if (curCountry && bar.country !== curCountry) return false;
  if (curSearch) {
    const hay = [
      bar.name, bar.nameZh, bar.country, bar.city, bar.style, bar.story, bar.visitDate,
      ...(bar.tags || []),
      ...(bar.drinks || []).flatMap(d => [d.name, d.note])
    ].join(' ').toLowerCase();
    if (!hay.includes(curSearch)) return false;
  }
  return true;
}

function currentList() {
  const list = MODE === 'drinks' ? DATA.filter(drinkMatches) : BARS.filter(barMatches);
  return list.slice().sort((a, b) => a.name.localeCompare(b.name, 'en'));
}

/* ── rendering ── */
function meterHtml(cls, label, val) {
  return `
    <div class="meter ${cls}">
      <div class="m-label">${label}</div>
      <div class="m-bar"><div class="m-fill" style="width:${val/5*100}%"></div></div>
      <div class="m-val">${val}/5</div>
    </div>`;
}

function starsHtml(n) {
  return '★'.repeat(n) + `<span class="dim">${'★'.repeat(5-n)}</span>`;
}

function render() {
  const list = currentList();
  document.getElementById('count-badge').textContent = `${list.length} 筆`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = MODE === 'bars' && !BARS.length
      ? '<div class="empty">還沒有酒吧紀錄。<br>跟 Claude 說「新增酒吧紀錄」開始建立你的旅行酒吧地圖 🌍</div>'
      : '<div class="empty">沒有符合條件的品項</div>';
    return;
  }

  list.forEach(item => {
    grid.appendChild(MODE === 'drinks' ? drinkCard(item) : barCard(item));
  });
}

function drinkCard(item) {
  const card = document.createElement('div');
  card.className = 'card';

  const typeChip = (item.category === 'cocktail' && TYPE_LABEL[item.type])
    ? `<span class="type-chip type-${item.type}">${TYPE_LABEL[item.type]}</span>` : '';

  const tagsHtml = (item.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');

  const ingredientsHtml = (item.ingredients && item.ingredients.length)
    ? `<ul class="ingredients">${item.ingredients.map(i => `<li>${i.amount} — ${i.name}</li>`).join('')}</ul>`
    : '';

  const techRow = [
    ['技法', item.technique], ['杯型', item.glass], ['裝飾', item.garnish]
  ].filter(([,v]) => v && v !== '—')
   .map(([k,v]) => `<span class="d-key">${k}</span>${v}`).join('　·　');

  card.innerHTML = `
    <div class="card-head">
      <span class="icon">${CAT_ICON[item.category] || '🍵'}</span>
      <h3>${item.name}${typeChip}</h3>
      ${item.nameZh ? `<span class="zh">${item.nameZh}</span>` : ''}
    </div>
    <div class="base">${item.base}</div>
    <div class="meters">
      ${meterHtml('acid', 'ACID 酸', item.acid)}
      ${meterHtml('sweet', 'SWEET 甜', item.sweet)}
      ${meterHtml('abv', 'ABV 酒感', item.abv)}
    </div>
    <div class="tags">${tagsHtml}</div>
    <div class="detail">
      ${techRow ? `<div class="d-row">${techRow}</div>` : ''}
      ${ingredientsHtml}
      ${item.pairing ? `<div class="pairing">🍽 餐搭　${item.pairing}</div>` : ''}
      ${item.story ? `<div class="story">${item.story}</div>` : ''}
      ${item.source ? `<div class="src">來源 · ${item.source}</div>` : ''}
    </div>
  `;

  card.addEventListener('click', () => card.classList.toggle('expanded'));
  return card;
}

function barCard(bar) {
  const card = document.createElement('div');
  card.className = 'card';

  const tagsHtml = (bar.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');

  const baseParts = [bar.city, bar.style, bar.visitDate ? `造訪 ${bar.visitDate}` : '']
    .filter(Boolean).join('　·　');

  const drinksHtml = (bar.drinks && bar.drinks.length)
    ? `<div class="drink-list">${bar.drinks.map(d => `
        <div class="drink-item">
          <div class="d-name">${d.name}${d.rating ? `<span class="d-stars">${'★'.repeat(d.rating)}</span>` : ''}</div>
          ${d.note ? `<div class="d-note">${d.note}</div>` : ''}
        </div>`).join('')}</div>`
    : '';

  card.innerHTML = `
    <div class="card-head">
      <span class="icon">${bar.flag || '📍'}</span>
      <h3>${bar.name}</h3>
      ${bar.nameZh ? `<span class="zh">${bar.nameZh}</span>` : ''}
    </div>
    <div class="base">${baseParts}</div>
    ${bar.rating ? `<div class="stars"><span class="r-label">RATING</span>${starsHtml(bar.rating)}</div>` : ''}
    <div class="tags">${tagsHtml}</div>
    <div class="detail">
      ${drinksHtml}
      ${bar.story ? `<div class="story">${bar.story}</div>` : ''}
    </div>
  `;

  card.addEventListener('click', () => card.classList.toggle('expanded'));
  return card;
}

/* ── export current (filtered) list as JSON to clipboard ── */
document.getElementById('export-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const list = currentList();
  const label = MODE === 'drinks' ? '酒窖收藏' : '酒吧紀錄';
  navigator.clipboard.writeText(JSON.stringify(list, null, 2)).then(() => {
    showToast(`已複製 ${list.length} 筆${label}到剪貼簿，可直接貼給 AC`);
  }).catch(() => {
    showToast('複製失敗，請改用瀏覽器直接開啟 JSON 檔');
  });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 2600);
}
</script>
</body>
</html>
