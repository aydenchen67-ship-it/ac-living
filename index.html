<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AC Cellar — Drink Library</title>
<style>
  :root {
    --bg:        #0d0f12;
    --card:      #16191e;
    --card-brd:  #262b33;
    --card-brd2: #3a414d;
    --ink:       #e8e6e1;
    --ink-2:     #9aa3ae;
    --muted:     #6b7280;
    --teal:      #4ecdc4;
    --yellow:    #f4c542;
    --orange:    #f08a4b;
    --chip-bg:   #1e232b;
    --chip-brd:  #2e3540;
    --track:     #262b33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: ui-monospace, "Cascadia Mono", Consolas, monospace; }

  main { max-width: 1480px; margin: 0 auto; padding: 24px 24px 80px; }

  /* header */
  header.top {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--card-brd);
    margin-bottom: 18px;
  }
  header.top h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 30px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 0.5px;
  }
  header.top .sub {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--ink-2);
    text-transform: uppercase;
    margin-top: 6px;
  }
  header.top .spacer { flex: 1; }
  .btn {
    background: var(--card);
    border: 1px solid var(--card-brd2);
    color: var(--ink);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--teal); }
  .count-badge {
    background: var(--card);
    border: 1px solid var(--card-brd2);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    color: var(--yellow);
    white-space: nowrap;
  }

  /* filter tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .tab {
    background: var(--card);
    border: 1px solid var(--card-brd);
    color: var(--ink-2);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab:hover { color: var(--ink); border-color: var(--card-brd2); }
  .tab.active { color: var(--yellow); border-color: var(--yellow); }
  .tabs .search {
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--card-brd);
    color: var(--ink);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 6px;
    padding: 8px 12px;
    min-width: 220px;
  }
  .tabs .search::placeholder { color: var(--muted); }

  .subtabs {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .subtabs.show { display: flex; }
  .subtab {
    background: transparent;
    border: 1px solid var(--card-brd);
    color: var(--ink-2);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    border-radius: 999px;
    padding: 5px 14px;
    cursor: pointer;
  }
  .subtab:hover { color: var(--ink); }
  .subtab.active { color: var(--teal); border-color: var(--teal); }

  /* grid & cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
    margin-top: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-brd);
    border-radius: 8px;
    padding: 20px 22px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--card-brd2); }
  .card.expanded { border-color: var(--card-brd2); }

  .card-head { display: flex; gap: 10px; align-items: baseline; }
  .card-head .icon { font-size: 16px; flex-shrink: 0; }
  .card-head h3 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 19px;
    font-weight: 700;
    margin: 0;
    flex: 1;
  }
  .card-head .zh {
    font-size: 13px;
    color: var(--ink-2);
    flex-shrink: 0;
    max-width: 40%;
    text-align: right;
  }
  .card .base {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12.5px;
    color: var(--ink-2);
    margin: 8px 0 14px;
  }

  .meters { display: flex; gap: 18px; margin-bottom: 14px; }
  .meter { flex: 1; }
  .meter .m-label {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .meter .m-bar {
    height: 4px;
    background: var(--track);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .meter .m-fill { height: 100%; border-radius: 2px; }
  .meter.acid .m-fill  { background: var(--teal); }
  .meter.sweet .m-fill { background: var(--yellow); }
  .meter.abv .m-fill   { background: var(--orange); }
  .meter .m-val {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    color: var(--ink);
  }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 11.5px;
    color: var(--teal);
    background: var(--chip-bg);
    border: 1px solid var(--chip-brd);
    border-radius: 4px;
    padding: 3px 9px;
  }

  /* expanded detail */
  .detail { display: none; margin-top: 16px; }
  .card.expanded .detail { display: block; }
  .detail .d-row {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12.5px;
    color: var(--ink-2);
    margin: 6px 0;
  }
  .detail .d-row .d-key { color: var(--muted); margin-right: 8px; }
  .detail ul.ingredients {
    margin: 10px 0;
    padding-left: 18px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.7;
  }
  .detail .pairing {
    font-size: 13px;
    color: var(--teal);
    margin: 10px 0;
  }
  .detail .story {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.75;
    margin: 10px 0;
  }
  .detail .src {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  .type-chip {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px;
    border-radius: 4px;
    padding: 2px 8px;
    margin-left: 8px;
    vertical-align: 2px;
    white-space: nowrap;
  }
  .type-classic        { color: var(--yellow); border: 1px solid var(--yellow); }
  .type-modern_classic { color: var(--teal);   border: 1px solid var(--teal); }
  .type-signature      { color: var(--orange); border: 1px solid var(--orange); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 14px;
    grid-column: 1 / -1;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--teal);
    color: var(--ink);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 13px;
    border-radius: 8px;
    padding: 10px 20px;
    display: none;
    z-index: 99;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<h1 class="sr-only">AC Cellar 飲品記錄庫：可搜尋篩選的調酒與酒款資料庫</h1>
<main>
  <header class="top">
    <div>
      <h1 aria-hidden="true">AC Cellar</h1>
      <div class="sub">Drink Library</div>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="export-btn" type="button">📋 匯出給 AC</button>
    <div class="count-badge" id="count-badge">…</div>
  </header>

  <div class="tabs" id="tabs">
    <input class="search" id="search" type="search" placeholder="搜尋酒名、基酒、標籤...">
  </div>
  <div class="subtabs" id="subtabs"></div>

  <div class="grid" id="grid"></div>
</main>
<div class="toast" id="toast"></div>

<script>
const CATS = [
  { key: '',         label: '全部' },
  { key: 'cocktail', label: '🍸 調酒' },
  { key: 'gin',      label: '🍸 Gin' },
  { key: 'whisky',   label: '🥃 Whisky' },
  { key: 'rum',      label: '🍹 Rum' },
  { key: 'tequila',  label: '🌵 Tequila / Mezcal' },
  { key: 'brandy',   label: '🍇 Brandy / Cognac' },
  { key: 'vodka',    label: '🧊 Vodka' },
  { key: 'wine',     label: '🍷 葡萄酒' },
  { key: 'sake',     label: '🍶 清酒／燒酎' },
  { key: 'beer',     label: '🍺 啤酒' },
  { key: 'other',    label: '🍵 其他' }
];
const SUBTYPES = [
  { key: '',               label: '全部' },
  { key: 'classic',        label: '經典 Classic' },
  { key: 'modern_classic', label: '現代經典 Modern Classic' },
  { key: 'signature',      label: '特調 Signature' }
];
const TYPE_LABEL = {
  classic: 'Classic', modern_classic: 'Modern Classic', signature: 'Signature'
};
const CAT_ICON = {
  cocktail: '🍸', gin: '🍸', whisky: '🥃', rum: '🍹', tequila: '🌵',
  brandy: '🍇', vodka: '🧊', wine: '🍷', sake: '🍶', beer: '🍺', other: '🍵'
};

let DATA = [];
let curCat = '';
let curSub = '';
let curSearch = '';

fetch('data.json')
  .then(r => r.json())
  .then(data => { DATA = data; buildTabs(); render(); })
  .catch(err => {
    document.getElementById('grid').innerHTML =
      '<div class="empty">讀取 data.json 失敗，請確認以本機伺服器開啟此頁面。</div>';
    console.error(err);
  });

function buildTabs() {
  const tabs = document.getElementById('tabs');
  const search = document.getElementById('search');
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'tab' + (c.key === curCat ? ' active' : '');
    b.type = 'button';
    b.textContent = c.label;
    b.dataset.key = c.key;
    b.addEventListener('click', () => {
      curCat = c.key;
      curSub = '';
      tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === curCat));
      buildSubtabs();
      render();
    });
    tabs.insertBefore(b, search);
  });
  buildSubtabs();
  search.addEventListener('input', () => { curSearch = search.value.trim().toLowerCase(); render(); });
}

function buildSubtabs() {
  const wrap = document.getElementById('subtabs');
  wrap.innerHTML = '';
  if (curCat !== 'cocktail') { wrap.classList.remove('show'); return; }
  wrap.classList.add('show');
  SUBTYPES.forEach(s => {
    const b = document.createElement('button');
    b.className = 'subtab' + (s.key === curSub ? ' active' : '');
    b.type = 'button';
    b.textContent = s.label;
    b.addEventListener('click', () => {
      curSub = s.key;
      wrap.querySelectorAll('.subtab').forEach((t, i) => t.classList.toggle('active', SUBTYPES[i].key === curSub));
      render();
    });
    wrap.appendChild(b);
  });
}

function matches(item) {
  if (curCat && item.category !== curCat) return false;
  if (curCat === 'cocktail' && curSub && item.type !== curSub) return false;
  if (curSearch) {
    const hay = [
      item.name, item.nameZh, item.base, item.story, item.source, item.pairing,
      ...(item.tags || []),
      ...(item.ingredients || []).map(i => i.name)
    ].join(' ').toLowerCase();
    if (!hay.includes(curSearch)) return false;
  }
  return true;
}

function meterHtml(cls, label, val) {
  return `
    <div class="meter ${cls}">
      <div class="m-label">${label}</div>
      <div class="m-bar"><div class="m-fill" style="width:${val/5*100}%"></div></div>
      <div class="m-val">${val}/5</div>
    </div>`;
}

function render() {
  const list = DATA.filter(matches);
  document.getElementById('count-badge').textContent = `${list.length} 筆`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="empty">沒有符合條件的品項</div>';
    return;
  }

  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    const typeChip = (item.category === 'cocktail' && TYPE_LABEL[item.type])
      ? `<span class="type-chip type-${item.type}">${TYPE_LABEL[item.type]}</span>` : '';

    const tagsHtml = (item.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');

    const ingredientsHtml = (item.ingredients && item.ingredients.length)
      ? `<ul class="ingredients">${item.ingredients.map(i => `<li>${i.amount} — ${i.name}</li>`).join('')}</ul>`
      : '';

    const techRow = [
      ['技法', item.technique], ['杯型', item.glass], ['裝飾', item.garnish]
    ].filter(([,v]) => v && v !== '—')
     .map(([k,v]) => `<span class="d-key">${k}</span>${v}`).join('　·　');

    card.innerHTML = `
      <div class="card-head">
        <span class="icon">${CAT_ICON[item.category] || '🍵'}</span>
        <h3>${item.name}${typeChip}</h3>
        ${item.nameZh ? `<span class="zh">${item.nameZh}</span>` : ''}
      </div>
      <div class="base">${item.base}</div>
      <div class="meters">
        ${meterHtml('acid', 'ACID 酸', item.acid)}
        ${meterHtml('sweet', 'SWEET 甜', item.sweet)}
        ${meterHtml('abv', 'ABV 酒感', item.abv)}
      </div>
      <div class="tags">${tagsHtml}</div>
      <div class="detail">
        ${techRow ? `<div class="d-row">${techRow}</div>` : ''}
        ${ingredientsHtml}
        ${item.pairing ? `<div class="pairing">🍽 餐搭　${item.pairing}</div>` : ''}
        ${item.story ? `<div class="story">${item.story}</div>` : ''}
        ${item.source ? `<div class="src">來源 · ${item.source}</div>` : ''}
      </div>
    `;

    card.addEventListener('click', () => card.classList.toggle('expanded'));
    grid.appendChild(card);
  });
}

/* export current (filtered) list as JSON to clipboard */
document.getElementById('export-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const list = DATA.filter(matches);
  const text = JSON.stringify(list, null, 2);
  navigator.clipboard.writeText(text).then(() => {
    showToast(`已複製 ${list.length} 筆資料到剪貼簿，可直接貼給 AC`);
  }).catch(() => {
    showToast('複製失敗，請改用瀏覽器直接開啟 data.json');
  });
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.display = 'none'; }, 2600);
}
</script>
</body>
</html>
